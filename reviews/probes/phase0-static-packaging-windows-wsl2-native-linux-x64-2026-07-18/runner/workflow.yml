name: Phase 0 standalone static-packaging probe

on:
  push:
    branches:
      - phase0-static-packaging-binding-closure-20260718

permissions:
  contents: read

jobs:
  native-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact runner commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install system packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component clippy,rustfmt
          rustup target add x86_64-unknown-linux-gnu --toolchain 1.96.0
          rustup target add x86_64-unknown-linux-musl --toolchain 1.96.0
          rustup default 1.96.0

      - name: Run native ext4 GNU and static musl probe
        run: bash reviews/probes/phase0-static-packaging-windows-wsl2-native-linux-x64-2026-07-18/runner/run-native.sh

      - name: Upload raw evidence and exact artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase0-static-packaging-native-${{ github.sha }}
          path: |
            reviews/probes/phase0-static-packaging-windows-wsl2-native-linux-x64-2026-07-18/evidence/native-linux-ext4
            reviews/probes/phase0-static-packaging-windows-wsl2-native-linux-x64-2026-07-18/source/target/x86_64-unknown-linux-gnu/release/lumin-phase0-static-packaging-probe
            reviews/probes/phase0-static-packaging-windows-wsl2-native-linux-x64-2026-07-18/source/target/x86_64-unknown-linux-musl/release/lumin-phase0-static-packaging-probe
          if-no-files-found: error
          retention-days: 7
