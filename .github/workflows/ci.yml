name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install exact Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --no-self-update

      - name: Verify formatting
        run: cargo fmt --all --check

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install exact Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update

      - name: Install dependency policy tools
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: |
            cargo-audit@0.22.2
            cargo-deny@0.20.2
          fallback: none

      - name: Audit RustSec advisories
        run: cargo audit --deny warnings

      - name: Enforce dependency policy
        run: cargo deny --locked check bans licenses sources

  platform:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
          - name: Windows
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install exact Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy,rustfmt --no-self-update

      - name: Record toolchain
        run: |
          rustc --version --verbose
          cargo --version

      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test all targets
        run: cargo test --workspace --all-targets --locked

      - name: Test documentation
        run: cargo test --workspace --doc --locked

      - name: Build release binary
        run: cargo build -p lumin-cli --release --locked

  required:
    name: Required
    if: ${{ always() }}
    needs:
      - formatting
      - dependency-policy
      - platform
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce required jobs
        env:
          FORMATTING_RESULT: ${{ needs.formatting.result }}
          DEPENDENCY_POLICY_RESULT: ${{ needs.dependency-policy.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
        run: |
          test "$FORMATTING_RESULT" = success
          test "$DEPENDENCY_POLICY_RESULT" = success
          test "$PLATFORM_RESULT" = success
